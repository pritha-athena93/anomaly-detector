# Two clients: node1 (IAM events) and node2 (S3+EC2 events)
# Data mounted via hostPath — path must exist on the scheduled worker node.
# In production, replace hostPath with a PVC backed by NFS or object storage.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-client-1
  namespace: federated-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-client-1
  template:
    metadata:
      labels:
        app: fl-client-1
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-1
      containers:
        - name: fl-client
          image: fl:latest
          imagePullPolicy: Never
          command: ["python", "fl/fl_client.py"]
          env:
            - name: DATA_PATH
              value: /data/federated/node1/features.parquet
            - name: NODE_ID
              value: "1"
            - name: FL_SERVER
              value: fl-server.federated-learning.svc:8080
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.mlflow.svc:5000
            - name: N_ESTIMATORS
              value: "100"
            - name: CONTAMINATION
              value: "0.08"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: data
          hostPath:
            path: /tmp/anomaly-data
