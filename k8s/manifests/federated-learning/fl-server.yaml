apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-server
  namespace: federated-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fl-server
  template:
    metadata:
      labels:
        app: fl-server
    spec:
      containers:
        - name: fl-server
          image: fl:latest   # built from fl/Dockerfile
          imagePullPolicy: Never
          command: ["python", "fl/fl_server.py"]
          env:
            - name: FL_ROUNDS
              value: "10"
            - name: FL_MIN_CLIENTS
              value: "2"
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow.mlflow.svc:5000
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fl-server
  namespace: federated-learning
spec:
  selector:
    app: fl-server
  ports:
    - port: 8080
      targetPort: 8080
