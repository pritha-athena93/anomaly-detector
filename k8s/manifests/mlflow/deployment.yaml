# Requires secret: mlflow-env-secret (created by scripts/create-secrets.sh)
#   keys: BACKEND_STORE_URI, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.13.0
          command:
            - /bin/sh
            - -c
            - |
              pip install -q psycopg2-binary==2.9.9 boto3==1.34.0 &&
              mlflow server \
                --host=0.0.0.0 \
                --port=5000 \
                --backend-store-uri="${BACKEND_STORE_URI}" \
                --default-artifact-root=s3://mlflow-artifacts
          env:
            - name: BACKEND_STORE_URI
              valueFrom:
                secretKeyRef:
                  name: mlflow-env-secret
                  key: BACKEND_STORE_URI
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-env-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-env-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://mlflow-minio:9000
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: mlflow
spec:
  selector:
    app: mlflow
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 32500
