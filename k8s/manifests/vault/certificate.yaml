# cert-manager Certificate for Vault's TLS listener.
# Issued by internal-ca-issuer (chain: selfsigned root → internal CA → this cert).
# Stored in secret vault-tls in the vault namespace.
# Vault Helm values (k8s/helm/vault/values.yaml) mount this secret.
#
# Reflector copies vault-tls to namespaces that call the Vault API over TLS.
# Consumers use ca.crt from the reflected secret to verify the Vault server cert.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-tls
  namespace: vault
spec:
  secretName: vault-tls
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: >-
        ml-agent,anomaly-poller,kubeflow,monitoring
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
  duration: 8760h    # 1 year
  renewBefore: 720h  # renew 30 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - vault
    - vault.vault
    - vault.vault.svc
    - vault.vault.svc.cluster.local
  issuerRef:
    name: internal-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
