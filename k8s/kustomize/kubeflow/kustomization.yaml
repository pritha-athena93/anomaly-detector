# kubectl apply -k k8s/kustomize/kubeflow
#
# Or build and inspect before applying:
#   kustomize build k8s/kustomize/kubeflow | kubectl apply -f -
#
# Note: CRDs register slowly — if apply fails, rerun. Takes ~15 min total.
# After apply:
#   kubectl wait --for=condition=Ready pod --all -n kubeflow --timeout=600s
#   kubectl port-forward svc/istio-ingressgateway -n istio-system 8080:80
#   Login: user@example.com / 12341234

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://github.com/kubeflow/manifests/example?ref=v1.9.1
