# Requires:
#   - redpanda-operator Helm release (infra/helm.tf) with cert-manager dependency
#   - cert-manager running (installs CA + leaf certs automatically)
#   - kafka namespace created (k8s/namespaces.yaml)
#   - gp3 StorageClass available (EKS default with AWS EBS CSI driver)
#
# TLS:
#   - Internal Raft (port 33145): mTLS between brokers
#   - Kafka API (port 9093): TLS, no client cert required (one-way TLS)
#   - Admin API (port 9644): TLS
#   - cert-manager issues a self-signed CA (anomaly-redpanda-default-root-certificate)
#     which signs broker certs. Consumers/producers mount the CA cert to verify.
#
# Bootstrap address (TLS):
#   anomaly-redpanda-0.anomaly-redpanda.kafka.svc:9093
apiVersion: cluster.redpanda.com/v1alpha2
kind: Redpanda
metadata:
  name: anomaly-redpanda
  namespace: kafka
spec:
  chartRef: {}
  clusterSpec:
    statefulset:
      replicas: 3

    tls:
      enabled: true
      certs:
        default:
          caEnabled: true   # cert-manager issues self-signed CA + broker leaf certs

    listeners:
      kafka:
        port: 9092          # plaintext (internal only, disabled below via tls.enabled)
        tls:
          enabled: true
          cert: default
          requireClientAuth: false   # one-way TLS; brokers present cert, clients verify CA
      rpc:
        port: 33145
        tls:
          enabled: true
          cert: default
      admin:
        port: 9644
        tls:
          enabled: true
          cert: default

    storage:
      persistentVolume:
        enabled: true
        size: 50Gi
        storageClass: gp3

    resources:
      cpu:
        cores: 2
      memory:
        container:
          max: 4Gi
        redpanda:
          memory: 3Gi
          reserveMemory: 1Gi   # reserved for page cache + OS

    config:
      cluster:
        default_topic_replications: 3
        min_insync_replicas: 2
        log_retention_ms: 604800000   # 7 days default; overridden per topic
