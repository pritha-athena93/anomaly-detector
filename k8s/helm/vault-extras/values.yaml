certificate:
  secretName: vault-tls
  duration: 8760h
  renewBefore: 720h
  issuerName: internal-ca-issuer
  dnsNames:
    - vault
    - vault.vault
    - vault.vault.svc
    - vault.vault.svc.cluster.local
    # Raft peer DNS — required for inter-pod TLS (vault-N.vault-internal headless svc)
    - vault-0.vault-internal
    - vault-1.vault-internal
    - vault-2.vault-internal
  # Namespaces reflector copies vault-tls into (consumers that verify Vault TLS)
  reflectionNamespaces: "ml-agent,anomaly-poller,training-pipeline,kubeflow,monitoring"
