# Vault Helm values — HA mode with integrated Raft storage + TLS + KMS auto-unseal.
#
# After `terraform apply`, update these two placeholder values:
#   vaultIrsaRoleArn  → terraform output -raw vault_irsa_role_arn
#   VAULT_KMS_KEY_ARN → terraform output -raw vault_kms_key_arn
# Then commit + push → ArgoCD syncs → pods auto-unseal on restart.
#
# TLS: cert-manager issues vault-tls secret (k8s/helm/vault-extras/templates/certificate.yaml).
# Reflector copies it to consumer namespaces (values in vault-extras/values.yaml).

ui:
  enabled: true

injector:
  enabled: true   # Vault Agent sidecar: inject secrets as files, not env vars

server:
  # ── IRSA annotation for KMS auto-unseal ───────────────
  # Replace with: terraform output -raw vault_irsa_role_arn
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::984445750473:role/anomaly-detector-vault-sa"

  # ── HA with Raft ──────────────────────────────────────
  standalone:
    enabled: false

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          address     = "[::]:8200"
          tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
          tls_key_file  = "/vault/userconfig/vault-tls/tls.key"
          tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
          tls_min_version = "tls12"
        }

        storage "raft" {
          path    = "/vault/data"
          node_id = "${HOSTNAME}"

          retry_join {
            leader_api_addr     = "https://vault-0.vault-internal:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt"
          }
          retry_join {
            leader_api_addr     = "https://vault-1.vault-internal:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt"
          }
          retry_join {
            leader_api_addr     = "https://vault-2.vault-internal:8200"
            leader_ca_cert_file = "/vault/userconfig/vault-tls/ca.crt"
          }
        }

        seal "awskms" {
          region     = "us-east-1"
          kms_key_id = "arn:aws:kms:us-east-1:984445750473:key/9c8c4a09-b24c-41d5-b8a8-eb541bb39c0e"
        }

        service_registration "kubernetes" {}

  # ── TLS cert from cert-manager ────────────────────────
  # cert-manager (sync-wave 1) runs before vault (sync-wave 3) — secret exists at pod start.

  volumes:
    - name: vault-tls
      secret:
        secretName: vault-tls

  volumeMounts:
    - name: vault-tls
      mountPath: /vault/userconfig/vault-tls
      readOnly: true

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 512Mi

  readinessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true
    port: 8200
    scheme: HTTPS

  livenessProbe:
    enabled: true
    path: /v1/sys/health?standbyok=true&sealedok=true
    port: 8200
    scheme: HTTPS

  # Persistent storage for Raft log
  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: gp3
