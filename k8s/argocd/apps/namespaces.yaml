# Deploys namespaces Helm chart — must be the first app ArgoCD reconciles.
# All other apps set CreateNamespace=false and depend on this being Ready.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/pritha-athena93/anomaly-detector.git
    targetRevision: main
    path: k8s/helm/namespaces
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false    # never auto-delete a namespace
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
