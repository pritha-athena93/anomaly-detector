# Vault HA with Raft + TLS.
# TLS cert issued by cert-manager via vault-extras Helm chart.
# Reflector copies vault-tls to consumer namespaces (values in vault-extras/values.yaml).
#
# NOTE: Vault starts sealed. After first deploy:
#   kubectl exec -n vault vault-0 -- vault operator init
#   kubectl exec -n vault vault-0 -- vault operator unseal <key>  (×3)
# Store unseal keys + root token in a secure offline location.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Helm chart from HashiCorp
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: 0.28.0
      helm:
        valueFiles:
          - $values/k8s/helm/vault/values.yaml
    # Values file reference for the HashiCorp chart above
    - repoURL: https://github.com/pritha-athena93/anomaly-detector.git
      targetRevision: main
      ref: values
    # vault-extras Helm chart: cert-manager Certificate (with Raft SANs + reflector)
    - repoURL: https://github.com/pritha-athena93/anomaly-detector.git
      targetRevision: main
      path: k8s/helm/vault-extras
      helm:
        valueFiles:
          - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
