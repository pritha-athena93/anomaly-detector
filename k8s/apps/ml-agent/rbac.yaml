apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-sa
  namespace: ml-agent
  annotations:
    # IRSA: EKS projects a token so the pod assumes this IAM role without static creds.
    # ARN comes from: terraform output irsa_agent_sa
    eks.amazonaws.com/role-arn: "arn:aws:iam::984445750473:role/anomaly-detector-agent-sa"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ml-agent-role
rules:
  # read pods across all namespaces (ops tools: get_pod_health)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # read + trigger Katib experiments (ops tools: trigger_katib_hpo)
  - apiGroups: ["kubeflow.org"]
    resources: ["experiments"]
    verbs: ["get", "list", "create"]
  # read KServe InferenceServices (ops tools: get_model_latency)
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ml-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ml-agent-role
subjects:
  - kind: ServiceAccount
    name: agent-sa
    namespace: ml-agent
