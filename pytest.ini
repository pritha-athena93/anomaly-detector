[pytest]
testpaths = tests
markers =
    unit: no external services required
    integration: requires live Kafka / Postgres / KServe / Vault in-cluster
    infra: requires AWS credentials + kubectl access
    e2e: full CloudTrail-to-Slack pipeline (all services running)
    security: secret and IAM audit (needs kubectl + AWS)
addopts = -v --tb=short
